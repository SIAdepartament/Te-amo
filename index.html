<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para alguien muy especial</title>
    <style>
        /* Diseño base con el fondo rosa pastel solicitado */
        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            background-color: #FFD1DC; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Título de la propuesta */
        h1 {
            color: #D147A3;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 50px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        /* Alineación horizontal para los dos corazones */
        .contenedor-botones {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            width: 100%;
            max-width: 600px;
            min-height: 250px;
        }

        /* Construcción geométrica del botón corazón */
        .boton-corazon {
            position: relative;
            width: 85px;
            height: 85px;
            background-color: #FF4D6D;
            border: none;
            cursor: pointer;
            transform: rotate(-45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease, width 0.3s ease, height 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        /* Orejas redondas del corazón mediante CSS nativo */
        .boton-corazon::before,
        .boton-corazon::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #FF4D6D;
            border-radius: 50%;
        }

        .boton-corazon::before {
            top: -50%;
            left: 0;
        }

        .boton-corazon::after {
            top: 0;
            left: 50%;
        }

        /* Texto interno del botón (enderezado a 45° para romper la rotación) */
        .texto-boton {
            position: relative;
            z-index: 10;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            transform: rotate(45deg); 
            transition: font-size 0.3s ease;
        }

        #btn-si {
            z-index: 5;
        }

        /* Estilo del texto de confirmación final */
        .mensaje-exito {
            color: #C71585;
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
            max-width: 85%;
            line-height: 1.5;
            animation: suavizar Entrada 0.6s ease forwards;
        }

        @keyframes suavizarEntrada {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1 id="titulo">¿Quieres ser mi novia?</h1>
    
    <div class="contenedor-botones" id="modulo-interactivo">
        <button class="boton-corazon" id="btn-si" onclick="aceptarPropuesta()">
            <span class="texto-boton" id="texto-si">Sí</span>
        </button>
        <button class="boton-corazon" id="btn-no" onclick="agrandarSi()">
            <span class="texto-boton">No</span>
        </button>
    </div>

    <script>
        let escalaSi = 1;
        let tamanoBase = 85;
        let tamanoTexto = 1.2;

        // Función que se activa al presionar el "No"
        function agrandarSi() {
            escalaSi += 0.45; // Factor de crecimiento por cada intento
            
            let botonSi = document.getElementById('btn-si');
            let textoSi = document.getElementById('texto-si');
            
            let nuevoTamano = tamanoBase * escalaSi;
            
            // Redimensionamiento del hardware gráfico del botón
            botonSi.style.width = nuevoTamano + 'px';
            botonSi.style.height = nuevoTamano + 'px';
            
            // Ajuste proporcional del texto interior
            textoSi.style.fontSize = (tamanoTexto * escalaSi) + 'rem';
        }

        // Función que despliega la respuesta final
        function aceptarPropuesta() {
            let contenedor = document.getElementById('modulo-interactivo');
            let titulo = document.getElementById('titulo');
            
            // Limpieza del lienzo
            titulo.style.display = 'none';
            
            // Inyección del texto solicitado en la interfaz
            contenedor.innerHTML = `<p class="mensaje-exito">gracias yo tambien quiero ser tu novio aunque ya seamos ❤️</p>`;
        }
    </script>
</body>
</html>
