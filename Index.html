<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para una persona especial</title>
    <style>
        /* Configuración del fondo rosa pastel y centrado absoluto */
        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            background-color: #FFD1DC; /* Rosa pastel */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Estilo del texto principal */
        h1 {
            color: #D147A3;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        /* Contenedor de los botones de control */
        .contenedor-botones {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            width: 100%;
            max-width: 500px;
            min-height: 200px;
        }

        /* Geometría y estilo base del botón corazón */
        .boton-corazon {
            position: relative;
            width: 80px;
            height: 80px;
            background-color: #FF4D6D;
            border: none;
            cursor: pointer;
            transform: rotate(-45deg);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease, width 0.3s ease, height 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        /* Formación de las curvas superiores del corazón */
        .boton-corazon::before,
        .boton-corazon::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #FF4D6D;
            border-radius: 50%;
        }

        .boton-corazon::before {
            top: -50%;
            left: 0;
        }

        .boton-corazon::after {
            top: 0;
            left: 50%;
        }

        /* Estilo del texto dentro del corazón (girado para quedar derecho) */
        .texto-boton {
            position: relative;
            z-index: 10;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            transform: rotate(45deg); /* Contrarresta la rotación del botón */
            transition: font-size 0.3s ease;
        }

        /* Ajuste específico para el botón SI cuando crezca */
        #btn-si {
            z-index: 5;
        }

        /* Animación suave para el mensaje final de éxito */
        .mensaje-exito {
            color: #C71585;
            font-size: 1.8rem;
            text-align: center;
            font-weight: bold;
            max-width: 80%;
            line-height: 1.4;
            animation: aparecer 0.5s ease forward;
        }

        @keyframes aparecer {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1 id="titulo">¿Quieres ser mi novia?</h1>
    
    <div class="contenedor-botones" id="modulo-interactivo">
        <button class="boton-corazon" id="btn-si" onclick="aceptarPropuesta()">
            <span class="texto-boton" id="texto-si">Sí</span>
        </button>
        <button class="boton-corazon" id="btn-no" onclick="agrandarSi()">
            <span class="texto-boton">No</span>
        </button>
    </div>

    <script>
        // Inicialización de variables de escala de hardware
        let escalaSi = 1;
        let tamanoBase = 80;
        let tamanoTexto = 1.2;

        function agrandarSi() {
            // Incremento progresivo del tamaño del botón "SÍ"
            escalaSi += 0.4;
            
            let nuevoBtnSi = document.getElementById('btn-si');
            let nuevoTextoSi = document.getElementById('texto-si');
            
            // Aplicar nuevas dimensiones físicas al contenedor corazón
            let nuevoTamano = tamanoBase * escalaSi;
            nuevoBtnSi.style.width = nuevoTamano + 'px';
            nuevoBtnSi.style.height = nuevoTamano + 'px';
            
            // Escalar el texto interno de manera proporcional
            nuevoTextoSi.style.fontSize = (tamanoTexto * escalaSi) + 'rem';
        }

        function aceptarPropuesta() {
            // Desmantelar el módulo de botones e inyectar la respuesta final configurada
            let contenedor = document.getElementById('modulo-interactivo');
            let titulo = document.getElementById('titulo');
            
            // Ocultar el título inicial
            titulo.style.display = 'none';
            
            // Desplegar el mensaje de confirmación en el contenedor principal
            contenedor.innerHTML = `<p class="mensaje-exito">¡Gracias! Yo también quiero ser tu novio, aunque ya seamos. ❤️</p>`;
        }
    </script>
</body>
</html>
